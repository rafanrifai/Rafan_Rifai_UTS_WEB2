<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopKu – Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to   { transform: translateX(0);   opacity: 1; }
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-purple-50
             dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 transition-colors duration-300">

  <!-- Toast Container -->
  <div id="toast-container"
    class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 items-end pointer-events-none">
  </div>

  <!-- Dark Mode Toggle -->
  <div class="fixed top-4 right-4 z-40">
    <button class="dark-mode-btn p-2.5 rounded-xl bg-white dark:bg-gray-700 shadow-md
                   text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-600
                   transition-colors border border-gray-200 dark:border-gray-600">
    </button>
  </div>

  <div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">

      <!-- Logo -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-2xl shadow-lg mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9 text-white" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">ShopKu</h1>
        <p class="text-gray-500 dark:text-gray-400 mt-1">Your favorite online shop</p>
      </div>

      <!-- Card -->
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl border border-gray-100
                  dark:border-gray-700 overflow-hidden">

        <!-- Tabs -->
        <div class="flex border-b border-gray-200 dark:border-gray-700">
          <button id="login-tab"
            class="flex-1 py-4 text-sm font-semibold transition-colors border-b-2
                   border-indigo-600 text-indigo-600">
            Sign In
          </button>
          <button id="register-tab"
            class="flex-1 py-4 text-sm font-semibold transition-colors border-b-2
                   border-transparent text-gray-500 dark:text-gray-400
                   hover:text-gray-700 dark:hover:text-gray-200">
            Create Account
          </button>
        </div>

        <div class="p-6 sm:p-8">

          <!-- Login Form -->
          <form id="login-form" class="space-y-5">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
                Email Address
              </label>
              <input id="login-email" type="email" placeholder="you@example.com"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600
                       bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                       placeholder-gray-400 dark:placeholder-gray-500
                       focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                       transition-colors" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
                Password
              </label>
              <div class="relative">
                <input id="login-password" type="password" placeholder="Enter your password"
                  class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600
                         bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                         placeholder-gray-400 dark:placeholder-gray-500
                         focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                         transition-colors pr-12" />
                <button type="button" onclick="togglePasswordVisibility('login-password', this)"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600
                         dark:hover:text-gray-300 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                  </svg>
                </button>
              </div>
            </div>
            <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold
                     py-3 px-6 rounded-xl transition-colors shadow-md hover:shadow-lg
                     flex items-center justify-center gap-2">
              Sign In
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13 7l5 5m0 0l-5 5m5-5H6" />
              </svg>
            </button>
            <div class="bg-indigo-50 dark:bg-indigo-900/30 rounded-xl p-3 text-center">
              <p class="text-xs text-indigo-600 dark:text-indigo-400">
                New here? Create an account to start shopping!
              </p>
            </div>
          </form>

          <!-- Register Form -->
          <form id="register-form" class="space-y-4 hidden">
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
                Full Name
              </label>
              <input id="reg-name" type="text" placeholder="John Doe"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600
                       bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                       placeholder-gray-400 dark:placeholder-gray-500
                       focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                       transition-colors" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
                Email Address
              </label>
              <input id="reg-email" type="email" placeholder="you@example.com"
                class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600
                       bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                       placeholder-gray-400 dark:placeholder-gray-500
                       focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                       transition-colors" />
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
                Password
                <span class="text-xs text-gray-400 font-normal ml-1">(min. 6 characters)</span>
              </label>
              <div class="relative">
                <input id="reg-password" type="password" placeholder="Create a password"
                  class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600
                         bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                         placeholder-gray-400 dark:placeholder-gray-500
                         focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                         transition-colors pr-12" />
                <button type="button" onclick="togglePasswordVisibility('reg-password', this)"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600
                         dark:hover:text-gray-300 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                  </svg>
                </button>
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">
                Confirm Password
              </label>
              <div class="relative">
                <input id="reg-confirm" type="password" placeholder="Repeat your password"
                  class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600
                         bg-white dark:bg-gray-700 text-gray-900 dark:text-white
                         placeholder-gray-400 dark:placeholder-gray-500
                         focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                         transition-colors pr-12" />
                <button type="button" onclick="togglePasswordVisibility('reg-confirm', this)"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600
                         dark:hover:text-gray-300 transition-colors">
                  <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                  </svg>
                </button>
              </div>
            </div>
            <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold
                     py-3 px-6 rounded-xl transition-colors shadow-md hover:shadow-lg
                     flex items-center justify-center gap-2 mt-2">
              Create Account
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
              </svg>
            </button>
          </form>

        </div>
      </div>

      <p class="text-center text-xs text-gray-400 dark:text-gray-500 mt-6">
        © 2024 ShopKu. All rights reserved.
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
