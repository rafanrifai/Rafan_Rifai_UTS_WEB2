<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopKu – Product Detail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">

  <div id="toast-container"
    class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 items-end pointer-events-none"></div>

  <!-- NAVBAR -->
  <nav class="sticky top-0 z-40 bg-white dark:bg-gray-800 shadow-sm border-b
              border-gray-200 dark:border-gray-700 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16 gap-4">
        <a href="shop.html" class="flex items-center gap-2">
          <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none"
              viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
          </div>
          <span class="text-xl font-bold text-indigo-600 dark:text-indigo-400">ShopKu</span>
        </a>
        <div class="flex items-center gap-2 sm:gap-3">
          <button class="dark-mode-btn p-2 rounded-lg text-gray-500 dark:text-gray-400
                         hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"></button>
          <a href="cart.html" class="relative p-2 rounded-lg text-gray-500 dark:text-gray-400
                                     hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
              viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <span class="cart-badge absolute -top-1 -right-1 bg-orange-500 text-white text-xs
                         w-5 h-5 rounded-full items-center justify-center font-bold hidden">0</span>
          </a>
          <div id="nav-user" class="flex items-center gap-2"></div>
        </div>
      </div>
    </div>
  </nav>

  <!-- BREADCRUMB -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
    <nav class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400">
      <a href="shop.html" class="hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">Shop</a>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
      <span class="text-gray-700 dark:text-gray-300 font-medium">Product Detail</span>
    </nav>
  </div>

  <!-- PRODUCT DETAIL -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-16">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100
                dark:border-gray-700 p-6 sm:p-8">
      <div id="product-container">
        <!-- Loading skeleton -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 animate-pulse">
          <div class="bg-gray-200 dark:bg-gray-700 rounded-2xl h-80 sm:h-96"></div>
          <div class="space-y-4">
            <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/4"></div>
            <div class="h-8 bg-gray-200 dark:bg-gray-700 rounded w-3/4"></div>
            <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-1/2"></div>
            <div class="h-10 bg-gray-200 dark:bg-gray-700 rounded w-1/3"></div>
            <div class="h-20 bg-gray-200 dark:bg-gray-700 rounded"></div>
            <div class="h-12 bg-gray-200 dark:bg-gray-700 rounded"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Related Products -->
    <div class="mt-12" id="related-section">
      <h3 class="text-xl font-bold text-gray-800 dark:text-white mb-6">You Might Also Like</h3>
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4" id="related-products"></div>
    </div>
  </main>

  <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <p class="text-center text-sm text-gray-500 dark:text-gray-400">
        © 2024 ShopKu. All rights reserved.
      </p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/products.js"></script>
  <script src="js/product-detail.js"></script>
</body>
</html>
