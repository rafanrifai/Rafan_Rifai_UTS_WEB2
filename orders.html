<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopKu – My Orders</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <style>
    .toggle-icon { transition: transform 0.2s ease; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">

  <div id="toast-container"
    class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 items-end pointer-events-none"></div>

  <!-- NAVBAR -->
  <nav class="sticky top-0 z-40 bg-white dark:bg-gray-800 shadow-sm border-b
              border-gray-200 dark:border-gray-700 transition-colors">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16 gap-4">
        <a href="shop.html" class="flex items-center gap-2">
          <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none"
              viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
            </svg>
          </div>
          <span class="text-xl font-bold text-indigo-600 dark:text-indigo-400">ShopKu</span>
        </a>
        <h1 class="text-lg font-bold text-gray-800 dark:text-white">My Orders</h1>
        <div class="flex items-center gap-2 sm:gap-3">
          <button class="dark-mode-btn p-2 rounded-lg text-gray-500 dark:text-gray-400
                         hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"></button>
          <a href="cart.html" class="relative p-2 rounded-lg text-gray-500 dark:text-gray-400
                                     hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
              viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            <span class="cart-badge absolute -top-1 -right-1 bg-orange-500 text-white text-xs
                         w-5 h-5 rounded-full items-center justify-center font-bold hidden">0</span>
          </a>
          <div id="nav-user" class="flex items-center gap-2"></div>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Order History</h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
          <span id="order-count" class="font-semibold text-gray-700 dark:text-gray-300">0 orders</span>
          placed with ShopKu
        </p>
      </div>
      <a href="shop.html"
        class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white
               text-sm font-semibold px-4 py-2 rounded-xl transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
        </svg>
        Shop More
      </a>
    </div>

    <!-- Empty State -->
    <div id="empty-orders" class="hidden text-center py-24">
      <div class="text-8xl mb-6">📦</div>
      <h3 class="text-2xl font-bold text-gray-700 dark:text-gray-300 mb-3">No orders yet</h3>
      <p class="text-gray-500 dark:text-gray-400 mb-8">You haven't placed any orders yet. Start shopping!</p>
      <a href="shop.html"
        class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white
               font-semibold px-8 py-3 rounded-xl transition-colors shadow-md">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
        </svg>
        Start Shopping
      </a>
    </div>

    <!-- Orders List -->
    <div id="orders-list" class="space-y-4"></div>
  </main>

  <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 mt-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
      <p class="text-center text-sm text-gray-500 dark:text-gray-400">
        © 2024 ShopKu. All rights reserved.
      </p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/orders.js"></script>
</body>
</html>
